<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zleap</title>
    <style>
      /* ════════════════════════════════════════════════════════════════
         Zleap splash — Stone base + Amber (kraft gold) brand identity.
         Adaptive light/dark, copper-gold accents, fully offline first launch.
         ════════════════════════════════════════════════════════════════ */
      :root {
        --bg-0: #f6f3ee;
        --bg-glow: rgba(180, 121, 64, 0.13);
        --text: #2c2722;
        --text-faint: #8c8378;
        --copper: #b47940;
        --copper-2: #cf9a4f;
        --copper-strong: #9a6a3a;
        --track: rgba(44, 39, 34, 0.09);
        --icon-ring: rgba(0, 0, 0, 0.06);
        --icon-shadow: 0 18px 44px -18px rgba(140, 92, 46, 0.5), 0 4px 12px -6px rgba(0, 0, 0, 0.1);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --danger: #c0492f;
        --danger-2: #e0654a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-0: #17130e;
          --bg-glow: rgba(210, 163, 94, 0.15);
          --text: #f3efe9;
          --text-faint: #a89f93;
          --copper: #d2a35e;
          --copper-2: #e3b974;
          --copper-strong: #c8924a;
          --track: rgba(255, 255, 255, 0.09);
          --icon-ring: rgba(255, 255, 255, 0.08);
          --icon-shadow: 0 22px 52px -18px rgba(0, 0, 0, 0.75), 0 0 0 1px rgba(255, 255, 255, 0.04);
          --danger: #e0654a;
          --danger-2: #f08368;
        }
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(1000px 560px at 50% -12%, var(--bg-glow), transparent 62%),
          var(--bg-0);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Segoe UI Variable",
          "Segoe UI", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
        overflow: hidden;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.4rem;
        padding: 2rem;
        text-align: center;
        animation: fade-up 0.55s var(--ease-out) both;
      }
      @keyframes fade-up {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: none; }
      }

      .logo { position: relative; width: 84px; height: 84px; }
      .logo::before {
        content: "";
        position: absolute;
        inset: -22%;
        border-radius: 50%;
        background: radial-gradient(circle, var(--bg-glow), transparent 68%);
        filter: blur(8px);
        animation: breathe 3.4s var(--ease-out) infinite;
        z-index: 0;
      }
      .logo img {
        position: relative;
        z-index: 1;
        width: 84px;
        height: 84px;
        border-radius: 21px;
        border: 1px solid var(--icon-ring);
        box-shadow: var(--icon-shadow);
        display: block;
        animation: rise 0.6s var(--ease-out) both;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(0.9); opacity: 0.5; }
        50% { transform: scale(1.08); opacity: 0.92; }
      }
      @keyframes rise {
        0% { opacity: 0; transform: scale(0.94); }
        100% { opacity: 1; transform: scale(1); }
      }

      .status {
        font-size: 0.96rem;
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--text);
        min-height: 1.3em;
        max-width: 320px;
      }

      .track {
        position: relative;
        width: 232px;
        height: 4px;
        border-radius: 999px;
        background: var(--track);
        overflow: hidden;
      }
      .fill {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 8%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--copper-strong), var(--copper-2));
        transition: width 0.65s var(--ease-out);
      }
      .fill::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
        transform: translateX(-100%);
        animation: shimmer 1.7s var(--ease-out) infinite;
      }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
      .track.error .fill {
        background: linear-gradient(90deg, var(--danger), var(--danger-2));
      }
      .track.error .fill::after { animation: none; opacity: 0; }

      .hint {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.6;
        color: var(--text-faint);
        max-width: 300px;
      }
    </style>
  </head>

      <p class="status" id="status">正在本地准备运行时，全程无需联网…</p>
      <div class="track" id="track"><span class="fill" id="fill"></span></div>
      <p class="hint" id="hint">首次启动需在本地解压运行时，约 30–60 秒（全程无需联网）。请勿关闭窗口。</p>
    </div>
    <script>
      // Determinate milestones — 'seed' (local unpack of the embedded ~880MB payload)
      // is the long first-launch step, so it claims a wide span and the shimmer keeps
      // the bar alive while the width holds. Driven by Rust via window.__zleapSetStep.
      const MILESTONES = {
        init: 8, seed: 34, update: 30, deps: 54, download: 54,
        serve: 72, connect: 88, route: 96, done: 100,
      };
      window.__zleapSetStep = (step, message) => {
        const statusEl = document.getElementById('status');
        const track = document.getElementById('track');
        const fill = document.getElementById('fill');
        if (message) statusEl.textContent = message;
        if (step === 'error') {
          track.classList.add('error');
          return;
        }
        track.classList.remove('error');
        const pct = MILESTONES[step];
        if (typeof pct === 'number') fill.style.width = pct + '%';
      };

      // Real (determinate) progress — reused by the in-app updater download.
      window.__zleapSetProgress = (pct, message) => {
        const statusEl = document.getElementById('status');
        const fill = document.getElementById('fill');
        if (message) statusEl.textContent = message;
        const clamped = Math.max(0, Math.min(100, Number(pct) || 0));
        fill.style.width = clamped + '%';
      };

      // Swap the bottom hint line (e.g. first-launch unpack vs. update download).
      window.__zleapSetHint = (text) => {
        const hintEl = document.getElementById('hint');
        if (hintEl && typeof text === 'string') hintEl.textContent = text;
      };
    </script>
