name: Release Desktop

# Configuration → build → publish, aligned with mainstream tooling:
#   - version is a single source of truth (root package.json); CI never writes back
#     to committed config (tauri.conf.json / distribution.json).
#   - expensive dependency bundles (managed Node + portable Postgres) are reused via
#     actions/cache. GitHub scopes caches per ref, and a tag run can only restore
#     caches from its own ref or the DEFAULT branch (main) — never from another tag.
#     So we PRIME those caches on `main` (push + weekly schedule): the build-node /
#     build-postgres jobs run on every trigger, while the heavy build/publish jobs
#     run on tags only. Tag releases then restore the warm main cache instead of
#     recompiling Postgres from source (~9 min) on every release.
#   - desktop builds + minisign updater (latest.json) come from the official
#     tauri-apps/tauri-action.
#   - latest.json = Tauri updater manifest; install-manifest.json = custom runtime
#     + payload install contract (RSA-signed), produced by the release job.
#   - jobs gate on explicit success; the release job never publishes a half build.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    # Prime the managed Node / Postgres caches on the default branch so tag
    # releases can restore them (GitHub caches are not shared across tags).
    branches:
      - main
  schedule:
    # Keep the primed main caches alive (GitHub evicts caches idle > 7 days).
    - cron: '0 18 * * 0'

jobs:
  build-cli-npm:
    # Non-priming job: only runs for real releases (tag) or manual dispatch.
    # On main/schedule the workflow only warms the Node/Postgres caches.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node scripts/distribution.mjs version)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}." >&2
            echo "Bump root package.json (and run pnpm sync:version) in the release PR before tagging." >&2
            exit 1
          fi

      - name: Check release readiness
        run: pnpm check:release-readiness

      - name: Smoke test install manifest validator
        run: pnpm smoke:manifest

      - name: Build thin npm CLI package
        run: pnpm pack:cli-npm

      - name: Smoke test thin npm CLI
        run: pnpm smoke:cli-npm

      - name: Verify npm package contents
        run: npm --cache /tmp/zleap-npm-cache pack --dry-run dist/npm/cli

      - name: Pack npm CLI tarball artifact
        run: |
          mkdir -p dist/npm/upload
          npm --cache /tmp/zleap-npm-cache pack dist/npm/cli --pack-destination dist/npm/upload

      - uses: actions/upload-artifact@v4
        with:
          name: npm-cli-package
          path: |
            dist/npm/cli
            dist/npm/upload/*.tgz
          if-no-files-found: error
          compression-level: 0

  build-node:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore managed Node bundle cache
        id: node-cache
        uses: actions/cache/restore@v4
        with:
          path: dist/node/upload
          key: zleap-node-${{ matrix.platform }}-${{ hashFiles('distribution.json', 'scripts/package-node.mjs', 'scripts/distribution.mjs', 'scripts/lib/platforms.mjs', 'scripts/lib/archive.mjs') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build managed Node bundle from pinned source
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: pnpm package:node
        env:
          ZLEAP_RELEASE_PLATFORM: ${{ matrix.platform }}

      - name: Smoke test Node bundle
        run: pnpm smoke:node-bundle

      - name: Write Node bundle checksums
        run: node scripts/distribution.mjs write-checksums dist/node/upload

      - name: Save managed Node bundle cache
        if: steps.node-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist/node/upload
          key: ${{ steps.node-cache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform }}
          path: dist/node/upload/*
          if-no-files-found: error
          compression-level: 0

  build-postgres:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Postgres bundle cache
        id: postgres-cache
        uses: actions/cache/restore@v4
        with:
          path: dist/postgres/upload
          key: zleap-postgres-${{ matrix.platform }}-${{ hashFiles('distribution.json', 'scripts/package-postgres.mjs', 'scripts/distribution.mjs', 'scripts/lib/platforms.mjs', 'scripts/lib/archive.mjs') }}

      - name: Configure MSVC
        if: runner.os == 'Windows' && steps.postgres-cache.outputs.cache-hit != 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Windows PostgreSQL build tools
        if: runner.os == 'Windows' && steps.postgres-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          choco install strawberryperl winflexbison3 --no-progress -y
          python -m pip install --upgrade meson ninja
          python -m mesonbuild.mesonmain --version
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        if: steps.postgres-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build portable Postgres bundle from official source
        if: steps.postgres-cache.outputs.cache-hit != 'true'
        run: pnpm package:postgres
        env:
          ZLEAP_RELEASE_PLATFORM: ${{ matrix.platform }}

      - name: Smoke test Postgres bundle
        run: pnpm smoke:postgres-bundle

      - name: Write Postgres bundle checksums
        run: node scripts/distribution.mjs write-checksums dist/postgres/upload

      - name: Save Postgres bundle cache
        if: steps.postgres-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist/postgres/upload
          key: ${{ steps.postgres-cache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@v4
        with:
          name: postgres-${{ matrix.platform }}
          path: dist/postgres/upload/*
          if-no-files-found: error
          compression-level: 0

  build-runtime:
    # Non-priming job: only runs for real releases (tag) or manual dispatch.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-node, build-postgres]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Relax Windows for pnpm deploy (Defender + symlinks)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # pnpm deploy intermittently fails creating node_modules/.bin shims when
          # Defender real-time protection scans the freshly written .cmd/.exe files.
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:TEMP" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "node.exe" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "pnpm.exe" -ErrorAction SilentlyContinue
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release readiness
        run: pnpm check:release-readiness

      - name: Download Node bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: dist/node/upload

      - name: Download Postgres bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: postgres-*
          merge-multiple: true
          path: dist/postgres/upload

      - name: Build release bundle
        run: node scripts/package-release.mjs

      - name: Smoke test app runtime
        run: node tests/smoke-app-runtime.mjs dist/app/${{ matrix.platform }}/app

      - name: Smoke test install manifest path
        if: runner.os != 'Windows'
        run: pnpm smoke:install

      - name: Archive CLI runtime + payload
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node scripts/distribution.mjs version)"
          mkdir -p dist/release/upload
          cp dist/release/${{ matrix.platform }}/distribution.env dist/release/upload/distribution-${VERSION}-${{ matrix.platform }}.env
          cp dist/release/${{ matrix.platform }}/cli/zleap-runtime-${VERSION}-${{ matrix.platform }}.tar.gz dist/release/upload/
          cp dist/release/${{ matrix.platform }}/payload/zleap-payload-${VERSION}-${{ matrix.platform }}.tar.gz dist/release/upload/

      - name: Write runtime + payload checksums
        run: node scripts/distribution.mjs write-checksums dist/release/upload

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.platform }}
          path: dist/release/upload/*
          if-no-files-found: error
          compression-level: 0

      - uses: actions/upload-artifact@v4
        with:
          name: payload-${{ matrix.platform }}
          path: dist/payload/${{ matrix.platform }}/payload/**
          if-no-files-found: error
          compression-level: 0

  build-npm-platforms:
    needs: build-runtime
    strategy:
      matrix:
        include:
          - platform: mac-arm64
          - platform: win-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download platform payload
        uses: actions/download-artifact@v4
        with:
          name: payload-${{ matrix.platform }}
          path: dist/payload/${{ matrix.platform }}/payload

      - name: Build npm platform package
        run: pnpm pack:npm-platforms -- ${{ matrix.platform }}

      - name: Verify npm platform package contents
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            mac-arm64) DIR=app-darwin-arm64 ;;
            win-x64) DIR=app-win32-x64 ;;
          esac
          npm --cache /tmp/zleap-npm-cache pack --dry-run "dist/npm/${DIR}"

      - name: Pack npm platform tarball artifact
        shell: bash
        run: |
          mkdir -p dist/npm/upload
          case "${{ matrix.platform }}" in
            mac-arm64) DIR=app-darwin-arm64 ;;
            win-x64) DIR=app-win32-x64 ;;
          esac
          npm --cache /tmp/zleap-npm-cache pack "dist/npm/${DIR}" --pack-destination dist/npm/upload

      - uses: actions/upload-artifact@v4
        with:
          name: npm-platform-${{ matrix.platform }}
          path: |
            dist/npm/app-*/**
            dist/npm/upload/*.tgz
          if-no-files-found: error
          compression-level: 0

  publish-npm:
    needs: [build-cli-npm, build-npm-platforms]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Require npm token for tag release
        if: env.NPM_TOKEN == ''
        run: |
          echo "NPM_TOKEN is required for tag releases"
          exit 1

      - name: Download npm CLI package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-cli-package
          path: dist/npm

      - name: Download npm platform package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-platform-*
          merge-multiple: true
          path: dist/npm

      - name: Publish npm platform packages
        shell: bash
        run: |
          set -euo pipefail
          for dir in dist/npm/app-darwin-arm64 dist/npm/app-win32-x64; do
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published; skipping (re-runs are idempotent)"
            else
              npm publish "$dir" --access public --provenance
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish npm CLI
        shell: bash
        run: |
          set -euo pipefail
          name="$(node -p "require('./dist/npm/cli/package.json').name")"
          version="$(node -p "require('./dist/npm/cli/package.json').version")"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already published; skipping (re-runs are idempotent)"
          else
            npm publish dist/npm/cli --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: build-runtime
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const body = [
              `Release ${tag}`,
              '',
              'macOS artifacts are Developer ID-signed and notarized when Apple credentials are configured.',
              'Windows win-x64 artifacts are currently unsigned for this release and may show OS security warnings.',
            ].join('\n');
            const existing = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
            const found = existing.data.find((release) => release.tag_name === tag);
            const release = found ?? (await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body,
              draft: true,
              prerelease: false,
            })).data;
            core.setOutput('release_id', release.id);

  tauri:
    needs: [build-runtime, create-release]
    if: ${{ !cancelled() && needs.build-runtime.result == 'success' && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check strict release readiness
        if: startsWith(github.ref, 'refs/tags/v')
        run: node tests/check-release-readiness.mjs --strict-release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ZLEAP_MANIFEST_PRIVATE_KEY: ${{ secrets.ZLEAP_MANIFEST_PRIVATE_KEY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Download desktop app payload
        uses: actions/download-artifact@v4
        with:
          name: payload-${{ matrix.platform }}
          path: dist/payload/${{ matrix.platform }}/payload

      - name: Embed fat (self-contained) desktop resources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf packages/desktop/src-tauri/resources
          node scripts/prepare-desktop-resources.mjs ${{ matrix.platform }} \
            --mode fat --out packages/desktop/src-tauri/resources

      - name: Render desktop frontend
        shell: bash
        run: |
          set -euo pipefail
          rm -rf packages/desktop/dist
          mkdir -p packages/desktop/dist
          cp packages/desktop/index.html packages/desktop/splash.html packages/desktop/error.html packages/desktop/dist/

      - name: Smoke test desktop resources
        run: node tests/smoke-desktop-resources.mjs packages/desktop/src-tauri/resources

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "APPLE_CERTIFICATE_BASE64 is not set; macOS build will use unsigned/ad-hoc behavior."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          IDENTITIES="$(security find-identity -v -p codesigning build.keychain)"
          echo "$IDENTITIES"
          DETECTED_IDENTITY="$(printf '%s\n' "$IDENTITIES" | awk -F'"' '/Developer ID Application|Apple Distribution|Apple Development/ { print $2; exit }')"
          SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY_SECRET:-$DETECTED_IDENTITY}"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No valid Apple code signing identity found in build.keychain"
            exit 1
          fi
          if ! printf '%s\n' "$IDENTITIES" | grep -F "$SIGNING_IDENTITY" >/dev/null; then
            echo "APPLE_SIGNING_IDENTITY does not match an imported codesigning identity: $SIGNING_IDENTITY"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign compressed desktop resources
        if: runner.os == 'macOS'
        run: node scripts/sign-macos-desktop-resources.mjs packages/desktop/src-tauri/resources

      - name: Build desktop app (tauri-action)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # NOTE: Notarization is temporarily DISABLED to unblock releases.
          # Tauri notarizes both the .app and the (several-hundred-MB fat) .dmg;
          # the DMG submission to Apple was hanging until the 6h job timeout.
          # Notarization is all-or-nothing in Tauri (driven by the presence of
          # these Apple credentials), so we drop them here while keeping
          # Developer ID code-signing via APPLE_SIGNING_IDENTITY. Result:
          # signed-but-unnotarized app+dmg (one first-launch Gatekeeper prompt).
          # To re-enable, uncomment the APPLE_ID/APPLE_API_* block below.
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  release:
    needs: [build-runtime, build-npm-platforms, tauri]
    if: ${{ !cancelled() && needs.build-runtime.result == 'success' && needs.build-npm-platforms.result == 'success' && needs.tauri.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ZLEAP_MANIFEST_PRIVATE_KEY: ${{ secrets.ZLEAP_MANIFEST_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download runtime + payload artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          merge-multiple: true
          path: dist/upload

      - name: Download Postgres bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: postgres-*
          merge-multiple: true
          path: dist/postgres/upload

      - name: Download npm CLI package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-cli-package
          path: dist/npm

      - name: Download npm platform package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-platform-*
          merge-multiple: true
          path: dist/npm

      - name: Preflight - assert every expected artifact is present
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node scripts/distribution.mjs version)"
          PLATFORMS="mac-arm64 win-x64"
          missing=0
          require() {
            if [ ! -f "$1" ]; then
              echo "MISSING: $1" >&2
              missing=1
            fi
          }
          for p in $PLATFORMS; do
            require "dist/upload/zleap-runtime-${VERSION}-${p}.tar.gz"
            require "dist/upload/zleap-payload-${VERSION}-${p}.tar.gz"
            require "dist/postgres/upload/zleap-postgres-"*"-${p}.tar.gz"
          done
          if ! ls dist/npm/upload/*.tgz >/dev/null 2>&1; then
            echo "MISSING: dist/npm/upload/*.tgz" >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Release preflight failed; artifact tree:" >&2
            find dist -maxdepth 4 -type f | sort >&2
            exit 1
          fi
          echo "Preflight OK for v${VERSION} (${PLATFORMS})"

      - name: Write install manifest
        run: node scripts/distribution.mjs write-install-manifest dist/upload

      - name: Validate install manifest
        run: node scripts/distribution.mjs validate-install-manifest dist/upload/install-manifest.json

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets
          # Curated, minimal end-user release. The desktop installers are now FULLY
          # self-contained (the full payload is embedded by the tauri job), so first
          # launch never downloads. The page deliberately carries only:
          #   - desktop installers + Tauri updater (uploaded directly by tauri-action)
          #   - zleap-payload-*.tar.gz  → required by the @zleap-ai/cli npm first-run
          #   - install-manifest.json   → CLI/runtime install contract (RSA-signed)
          #   - SHA256SUMS              → checksums over the above
          # Dropped as redundant: zleap-runtime-* (in-place upgrade tar; CLI re-seeds
          # from payload) and zleap-postgres-* (already contained inside the payload).
          # npm packages live on the npm registry; *-bundle.env(.sha256) are CI-internal.
          find dist/upload -type f \
            ! -name 'zleap-runtime-*' \
            ! -name 'node-bundle.env' \
            ! -name 'node-bundle.env.sha256' \
            -exec cp {} dist/release-assets/ \;
          node scripts/distribution.mjs write-checksums dist/release-assets

      - name: Upload install assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/release-assets/* --clobber

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const releases = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
            const release = releases.data.find((item) => item.tag_name === tag);
            if (!release) {
              throw new Error(`Release ${tag} not found while publishing`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });

  # Post-release smoke: exercise the REAL user-facing fetch paths against the just-
  # published release, closing the gap that local smoke tests use file:// fixtures and
  # never hit the live 'latest' redirect, signature chain, or npm registry.
  verify-release:
    needs: [release, publish-npm]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.release.result == 'success' && needs.publish-npm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify signed install manifest via the published 'latest' redirect
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Render the install-manifest URL from distribution.json (same source the
          # install.sh / npm first-run paths use).
          URL="$(node -e "const d=require('./distribution.json');const r=d.release.installManifestUrl;process.stdout.write(r.replace('{owner}',d.github.owner).replace('{repo}',d.github.repo).replace('{manifestFile}','install-manifest.json'))")"
          echo "install-manifest: $URL"
          curl -fSL --retry 6 --retry-delay 10 -o install-manifest.json "$URL"
          curl -fSL --retry 6 --retry-delay 10 -o install-manifest.json.sig "$URL.sig"
          # Verify the RSA-SHA256 signature exactly as install.sh does: the .sig is
          # base64, the public key is committed (base64 PEM) in distribution.json.
          base64 -d install-manifest.json.sig > install-manifest.json.sig.bin
          node -e "const d=require('./distribution.json');let k=d.updater.manifestPublicKey.trim();let pem=k.includes('BEGIN PUBLIC KEY')?k.replace(/\\\\n/g,String.fromCharCode(10)):Buffer.from(k,'base64').toString('utf8');require('fs').writeFileSync('manifest-pub.pem',pem)"
          openssl dgst -sha256 -verify manifest-pub.pem -signature install-manifest.json.sig.bin install-manifest.json
          MANIFEST_VERSION="$(node -p "require('./install-manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "install-manifest version $MANIFEST_VERSION != tag $VERSION" >&2
            exit 1
          fi
          for p in mac-arm64 win-x64; do
            ASSET="$(node -e "const m=require('./install-manifest.json');process.stdout.write(m.payload.platforms['$p'].url)")"
            echo "HEAD payload[$p]: $ASSET"
            curl -fSIL --retry 6 --retry-delay 10 -o /dev/null "$ASSET"
          done
          echo "Signed install manifest + payload URLs OK for v$VERSION"

      - name: Verify @zleap-ai/cli is published and resolvable on npm
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5 6; do
            PUBLISHED="$(npm view "@zleap-ai/cli@$VERSION" version 2>/dev/null || true)"
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "@zleap-ai/cli@$VERSION resolvable on npm"
              exit 0
            fi
            echo "npm registry not propagated yet (attempt $attempt); retrying in 15s..."
            sleep 15
          done
          echo "@zleap-ai/cli@$VERSION not resolvable on npm after retries" >&2
          exit 1
